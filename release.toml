[pre-release-replacements]
[[pre-release-replacements]]
file    = "CHANGELOG.md"
search  = "## Unreleased"
replace = "## {{version}} - {{date}}"
exactly = 1

[[pre-release-replacements]]
file    = "CHANGELOG.md"
search  = "<!-- next-header -->"
replace = "<!-- next-header -->\n\n## Unreleased\n"
exactly = 1
