name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact binrs command you ran
      placeholder: binrs encode "hello" --format hex
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `binrs --version`
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
