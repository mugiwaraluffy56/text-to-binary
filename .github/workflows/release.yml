name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: binrs-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: binrs-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: binrs-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: binrs-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/binrs ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/binrs.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  completions:
    name: Generate shell completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Generate completions
        run: |
          mkdir -p completions
          ./target/release/binrs completions bash > completions/binrs.bash
          ./target/release/binrs completions zsh  > completions/_binrs
          ./target/release/binrs completions fish > completions/binrs.fish
          ./target/release/binrs completions powershell > completions/binrs.ps1

      - name: Archive completions
        run: tar czf binrs-completions.tar.gz -C completions .

      - uses: actions/upload-artifact@v4
        with:
          name: binrs-completions
          path: binrs-completions.tar.gz

  release:
    needs: [build, completions]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
